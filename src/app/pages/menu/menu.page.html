<!-- Header do Menu -->
<ion-header class="ion-no-border">
  <ion-toolbar class="menu-toolbar">
    <ion-title class="menu-header-title">
      <ion-icon name="build-outline" class="header-icon"></ion-icon>
      Chamados Técnicos
    </ion-title>
  </ion-toolbar>
</ion-header>

<!-- Conteúdo do Menu Principal -->
<ion-content class="menu-content">

  <!-- Resumo rápido no topo -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-number">{{ chamadoService.listarChamados().length }}</span>
      <span class="stat-label">Chamados</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-number">{{ chamadoService.listarTecnicos().length }}</span>
      <span class="stat-label">Técnicos</span>
    </div>
  </div>

  <!-- Grid de botões do menu -->
  <div class="menu-grid">

    <!-- Cada card do menu é gerado a partir do array menuItems -->
    <ion-card
      *ngFor="let item of menuItems; let i = index"
      class="menu-card"
      (click)="navegarPara(item.route)"
      button
      [style.animation-delay]="(i * 0.08) + 's'"
    >
      <ion-card-content class="menu-card-content">
        <!-- Ícone com cor dinâmica -->
        <div class="menu-icon-wrapper" [style.background]="item.color">
          <ion-icon [name]="item.icon" class="menu-icon"></ion-icon>
        </div>
        <!-- Texto do item -->
        <div class="menu-text">
          <span class="menu-label">{{ item.label }}</span>
          <span class="menu-description">{{ item.description }}</span>
        </div>
        <!-- Seta de navegação -->
        <ion-icon name="chevron-forward-outline" class="menu-arrow"></ion-icon>
      </ion-card-content>
    </ion-card>

  </div>

  <!-- Botão Sair -->
  <div class="logout-container">
    <ion-button
      expand="block"
      fill="outline"
      color="danger"
      shape="round"
      (click)="sair()"
      class="logout-button"
    >
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Sair do Sistema
    </ion-button>
  </div>

</ion-content>
