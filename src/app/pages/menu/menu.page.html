<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Menu Principal</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" color="light">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="menu-content" [fullscreen]="true">
  <div class="menu-container">

    <!-- Saudação Animada -->
    <div class="welcome-section">
      <div class="welcome-avatar">
        <ion-icon name="construct-outline"></ion-icon>
      </div>
      <h2>Bem-vindo(a),</h2>
      <h1>Administrador</h1>
      <div class="welcome-subtitle">PAINEL DE CONTROLE</div>
    </div>

    <!-- Grid de Navegação Interativa -->
    <div class="nav-section">
      <ion-grid>
        <ion-row>

          <ion-col size="6">
            <div class="nav-card" (click)="cadastrarChamado()">
              <div class="nav-icon-wrapper icon-purple">
                <ion-icon name="add-circle-outline"></ion-icon>
              </div>
              <span class="nav-label">Cadastro de Chamado</span>
            </div>
          </ion-col>

          <ion-col size="6">
            <div class="nav-card" (click)="listarChamados()">
              <div class="nav-icon-wrapper icon-green">
                <ion-icon name="list-outline"></ion-icon>
              </div>
              <span class="nav-label">Lista de Chamados</span>
            </div>
          </ion-col>

          <ion-col size="6">
            <div class="nav-card" (click)="cadastrarTecnico()">
              <div class="nav-icon-wrapper icon-pink">
                <ion-icon name="person-add-outline"></ion-icon>
              </div>
              <span class="nav-label">Cadastro de Técnico</span>
            </div>
          </ion-col>

          <ion-col size="6">
            <div class="nav-card" (click)="listarTecnicos()">
              <div class="nav-icon-wrapper icon-teal">
                <ion-icon name="people-outline"></ion-icon>
              </div>
              <span class="nav-label">Lista de Técnicos</span>
            </div>
          </ion-col>

          <ion-col size="6">
            <div class="nav-card" (click)="verResumo()">
              <div class="nav-icon-wrapper icon-blue">
                <ion-icon name="stats-chart-outline"></ion-icon>
              </div>
              <span class="nav-label">Resumo</span>
            </div>
          </ion-col>

          <ion-col size="6">
            <div class="nav-card" (click)="verSobre()">
              <div class="nav-icon-wrapper icon-orange">
                <ion-icon name="information-circle-outline"></ion-icon>
              </div>
              <span class="nav-label">Sobre</span>
            </div>
          </ion-col>

        </ion-row>
      </ion-grid>
    </div>

  </div>
</ion-content>
