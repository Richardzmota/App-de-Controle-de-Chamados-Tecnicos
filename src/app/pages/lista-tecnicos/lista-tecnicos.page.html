<ion-header class="ion-no-border">
  <ion-toolbar class="page-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu" text="" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <ion-icon name="people-outline" class="header-icon"></ion-icon>
      Lista de Técnicos
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="list-content">
  <div class="list-container">
    <div class="list-counter">
      <span>{{ chamadoService.listarTecnicos().length }} técnico(s) encontrado(s)</span>
    </div>

    <div class="empty-state" *ngIf="chamadoService.listarTecnicos().length === 0">
      <ion-icon name="person-outline" class="empty-icon"></ion-icon>
      <p class="empty-text">Nenhum técnico cadastrado.</p>
    </div>

    <ion-card
      *ngFor="let tecnico of chamadoService.listarTecnicos(); let i = index"
      class="chamado-card"
      [style.animation-delay]="(i * 0.06) + 's'"
    >
      <ion-card-header>
        <div class="card-header-row">
          <ion-card-title class="chamado-titulo">
            #{{ tecnico.id }} — {{ tecnico.nome }}
          </ion-card-title>
        </div>
        <ion-card-subtitle class="chamado-solicitante">
          Especialidade: {{ tecnico.especialidade || 'Não informada' }}
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <div class="badges-row">
          <ion-badge [color]="corSituacao(tecnico.situacao)" class="badge-item">
            {{ tecnico.situacao || 'Desconhecida' }}
          </ion-badge>
        </div>

        <p class="chamado-info">
          <strong>Contato:</strong> {{ tecnico.contato }}
        </p>

        <div class="action-buttons">
          <ion-button
            fill="outline"
            size="small"
            color="danger"
            (click)="confirmarExclusao(tecnico.id, tecnico.nome)"
          >
            <ion-icon name="trash-outline" slot="start"></ion-icon>
            Excluir
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
