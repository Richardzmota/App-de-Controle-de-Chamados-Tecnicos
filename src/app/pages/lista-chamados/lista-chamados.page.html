<!-- Header com botão voltar -->
<ion-header class="ion-no-border">
  <ion-toolbar class="page-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu" text="" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <ion-icon name="list-outline" class="header-icon"></ion-icon>
      Lista de Chamados
    </ion-title>
  </ion-toolbar>
</ion-header>

<!-- Conteúdo da lista -->
<ion-content class="list-content">
  <div class="list-container">

    <!-- Contador -->
    <div class="list-counter">
      <span>{{ chamadoService.listarChamados().length }} chamado(s) encontrado(s)</span>
    </div>

    <!-- Mensagem quando não há chamados -->
    <div class="empty-state" *ngIf="chamadoService.listarChamados().length === 0">
      <ion-icon name="document-text-outline" class="empty-icon"></ion-icon>
      <p class="empty-text">Nenhum chamado cadastrado.</p>
    </div>

    <!-- Cards dos chamados -->
    <ion-card
      *ngFor="let chamado of chamadoService.listarChamados(); let i = index"
      class="chamado-card"
      [style.animation-delay]="(i * 0.06) + 's'"
    >
      <ion-card-header>
        <div class="card-header-row">
          <ion-card-title class="chamado-titulo">
            <span class="chamado-id">#{{ chamado.id }}</span> — {{ chamado.titulo }}
          </ion-card-title>
        </div>
        <ion-card-subtitle class="chamado-solicitante">
          Solicitante: {{ chamado.solicitante }}
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <!-- Badges de prioridade e status -->
        <div class="badges-row">
          <ion-badge [color]="corPrioridade(chamado.prioridade)" class="badge-item">
            {{ chamado.prioridade }}
          </ion-badge>
          <ion-badge [color]="corStatus(chamado.status)" class="badge-item">
            {{ chamado.status }}
          </ion-badge>
        </div>

        <!-- Técnico -->
        <p class="chamado-info">
          <strong>Técnico:</strong> {{ chamado.tecnico }}
        </p>

        <!-- Botões de ação -->
        <div class="action-buttons">
          <ion-button
            fill="outline"
            size="small"
            color="light"
            (click)="verDetalhes(chamado.id)"
          >
            <ion-icon name="eye-outline" slot="start"></ion-icon>
            Detalhes
          </ion-button>

          <ion-button
            fill="outline"
            size="small"
            color="danger"
            (click)="confirmarExclusao(chamado.id, chamado.titulo)"
          >
            <ion-icon name="trash-outline" slot="start"></ion-icon>
            Excluir
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
