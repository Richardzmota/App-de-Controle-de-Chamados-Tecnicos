<!-- Header com botão voltar -->
<ion-header class="ion-no-border">
  <ion-toolbar class="page-toolbar">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/detalhes-chamado/' + (chamado?.id || '')" text="" color="light"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <ion-icon name="create-outline" class="header-icon"></ion-icon>
      Atualizar Status
    </ion-title>
  </ion-toolbar>
</ion-header>

<!-- Conteúdo do formulário -->
<ion-content class="form-content">
  <div class="form-container">

    <!-- Chamado não encontrado -->
    <div class="empty-state" *ngIf="!chamado">
      <ion-text color="light">
        <p>Chamado não encontrado.</p>
      </ion-text>
    </div>

    <!-- Formulário de atualização -->
    <div *ngIf="chamado">

      <!-- Resumo do chamado -->
      <div class="chamado-resume">
        <span class="resume-id">#{{ chamado.id }}</span>
        <h3 class="resume-title">{{ chamado.titulo }}</h3>
        <p class="resume-info">Solicitante: {{ chamado.solicitante }}</p>
        <div class="resume-badges">
          <ion-badge [color]="corStatus(chamado.status)">Status atual: {{ chamado.status }}</ion-badge>
        </div>
      </div>

      <!-- Card do formulário -->
      <ion-card class="form-card">
        <ion-card-header>
          <ion-card-title class="card-title">Novo Status</ion-card-title>
        </ion-card-header>

        <ion-card-content>

          <!-- Seleção do novo status -->
          <ion-item class="form-item" lines="none">
            <ion-select
              label="Status *"
              labelPlacement="floating"
              [(ngModel)]="novoStatus"
              placeholder="Selecione o novo status"
              interface="action-sheet"
            >
              <ion-select-option *ngFor="let s of statusOptions" [value]="s">
                {{ s }}
              </ion-select-option>
            </ion-select>
          </ion-item>

          <!-- Campo de observação -->
          <ion-item class="form-item" lines="none">
            <ion-textarea
              label="Observação"
              labelPlacement="floating"
              [(ngModel)]="observacao"
              placeholder="Adicione uma observação (opcional)"
              rows="4"
              autoGrow="true"
            ></ion-textarea>
          </ion-item>

          <!-- Mensagem de erro -->
          <div class="error-container" *ngIf="mensagemErro">
            <ion-text color="danger">
              <p class="error-message">
                <ion-icon name="alert-circle-outline"></ion-icon>
                {{ mensagemErro }}
              </p>
            </ion-text>
          </div>

          <!-- Botão Salvar -->
          <ion-button
            expand="block"
            (click)="salvar()"
            class="save-button"
            shape="round"
            size="large"
          >
            <ion-icon name="save-outline" slot="start"></ion-icon>
            Salvar Alteração
          </ion-button>

        </ion-card-content>
      </ion-card>

    </div>

  </div>
</ion-content>
